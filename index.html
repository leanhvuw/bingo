<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bingooo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; padding-top: 20px; }
        
        /* Room Controls & Inputs */
        #roomControls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        input { width: 150px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; }
        
        /* Button Colors */
        .btn-join { background-color: #007bff; color: white; }
        .btn-create { background-color: #17a2b8; color: white; }
        .btn-newgame { background-color: #28a745; color: white; }
        .btn-leave { background-color: #6c757d; color: white; }
        .btn-start { background-color: #ff8c00; color: white; font-size: 1.2rem; padding: 15px 30px; margin-top: 10px; margin-bottom: 10px; display: none; }
        .btn-shuffle { background-color: #ff8c00; color: white; margin-bottom: 10px; }
        .btn-propose { background-color: #17a2b8; color: white; margin-bottom: 10px; }
        
        /* Status & Typography */
        .status { color: #666; font-weight: bold; margin-bottom: 5px; height: 25px; font-size: 1.1rem; text-align: center; }
        .turn-indicator { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; display: none; }
        #vicAlScoreBoard { font-size: 1.3rem; font-weight: 900; color: #d63384; margin-bottom: 10px; display: none; background: #fff; padding: 5px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Layout Areas */
        #waitingArea { display: none; flex-direction: column; align-items: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .name-input { margin-bottom: 15px; text-align: center; width: 80%; }
        #gameArea { display: none; flex-direction: column; align-items: center; width: 100%; }
        #firstMoveControls { display: none; gap: 10px; margin-bottom: 15px; }
        .action-buttons { display: none; gap: 10px; margin-top: 20px; }
        
        /* Grid System */
        .grid { display: grid; gap: 8px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .cell { width: 60px; height: 60px; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; font-weight: bold; border-radius: 8px; background: #fff; position: relative; overflow: hidden; transition: all 0.2s; }
        
        /* Spectator Layout */
        #spectatorArea { display: none; flex-wrap: wrap; justify-content: center; gap: 30px; margin-bottom: 20px; max-width: 90vw; }
        .board-wrapper { display: flex; flex-direction: column; align-items: center; }
        .board-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }

        /* Distinct Colors for up to 6 players */
        .color-0 { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; } /* Green */
        .color-1 { background-color: #cce5ff !important; border-color: #007bff !important; color: #004085 !important; } /* Blue */
        .color-2 { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; } /* Red */
        .color-3 { background-color: #fff3cd !important; border-color: #ffc107 !important; color: #856404 !important; } /* Yellow */
        .color-4 { background-color: #e2e3e5 !important; border-color: #6c757d !important; color: #383d41 !important; } /* Grey */
        .color-5 { background-color: #d1ecf1 !important; border-color: #17a2b8 !important; color: #0c5460 !important; } /* Cyan */
        
        /* Highlight last marked cell */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 15px #000; } 100% { transform: scale(1); } }
        .last-marked { border-width: 3px !important; animation: pulse 1.5s infinite; z-index: 5; }
        
        /* Winning Line Overlays */
        .winning-cell { background-color: #ffc107 !important; border-color: #e0a800 !important; color: #333 !important; z-index: 1; }
        .winning-cell::after { content: ''; position: absolute; background-color: rgba(255, 255, 255, 0.7); z-index: 2; }
        
        .line-h::after { width: 100%; height: 4px; top: 50%; left: 0; transform: translateY(-50%); }
        .line-v::after { width: 4px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
        .line-d1::after { width: 140%; height: 4px; top: 50%; left: -20%; transform: rotate(45deg); }
        .line-d2::after { width: 140%; height: 4px; top: 50%; left: -20%; transform: rotate(-45deg); }
        
        /* End game messages */
        #winMsg { color: #28a745; font-size: 2.5rem; display: none; font-weight: 900; animation: bounce 0.5s infinite alternate; }
        #loseMsg { color: #dc3545; font-size: 2.5rem; display: none; font-weight: 900; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* Proposal modal */
        #proposalModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-content button { margin: 10px 5px; }
    </style>
</head>
<body>

    <div id="roomControls">
        <input type="text" id="roomId" placeholder="Room Name">
        <select id="maxPlayers">
            <option value="2">Max 2</option>
            <option value="3">Max 3</option>
            <option value="4">Max 4</option>
            <option value="5">Max 5</option>
            <option value="6">Max 6</option>
        </select>
        <button class="btn-create" id="createBtn" onclick="createRoom()">Create</button>
        <button class="btn-join" id="joinBtn" onclick="joinRoom()">Join</button>
    </div>

    <div id="waitingArea">
        <h2 id="waitingTitle">Room: ...</h2>
        <input type="text" id="playerNameInput" class="name-input" placeholder="Your Name (Optional)" onchange="savePlayerName()">
        <div id="waitingStatus" class="status">Waiting for players... (1/2)</div>
        <button id="startBtn" class="btn-start" onclick="startGame()">Start Game</button>
        <button id="leaveWaitingBtn" class="btn-leave" onclick="leaveRoom()" style="margin-top: 10px;">Leave Room</button>
    </div>
    
    <div id="gameArea">
        <div id="vicAlScoreBoard"></div>

        <div id="status" class="status"></div>
        <div id="turnIndicator" class="turn-indicator"></div>
        
        <div id="winMsg">★ BINGO! ★</div>
        <div id="loseMsg">GAME OVER</div>
        
        <div id="firstMoveControls">
            <button id="shuffleBtn" class="btn-shuffle" onclick="shuffleMyBoard()">Shuffle Board</button>
            <button id="proposeMeBtn" class="btn-propose" onclick="proposeFirst('me')">I go first</button>
            <button id="proposeOppBtn" class="btn-propose" onclick="proposeFirst('opp')">You go first</button>
        </div>

        <div id="bingoBoard" class="grid"></div>

        <div id="spectatorArea"></div>
        
        <div id="afterGameActions" class="action-buttons">
            <button class="btn-newgame" id="newGameBtn" onclick="newGame()">Start New Match</button>
            <button class="btn-leave" onclick="leaveRoom()">Leave Room</button>
        </div>
    </div>

    <div id="proposalModal">
        <div class="modal-content">
            <h3 id="proposalMsg"></h3>
            <button class="btn-newgame" onclick="respondProposal(true)">Accept</button>
            <button class="btn-leave" onclick="respondProposal(false)">Decline</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfpiAPFdf-TGrzZksRDXecy7szOoU_5ts",
            authDomain: "bingo-964ba.firebaseapp.com",
            databaseURL: "https://bingo-964ba-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bingo-964ba",
            storageBucket: "bingo-964ba.firebasestorage.app",
            messagingSenderId: "870098576889",
            appId: "1:870098576889:web:7d1e32ca3d091a2aa44928"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const myId = "player_" + Math.floor(Math.random() * 1000000);
        let currentRoom = "";
        let isGameOver = false;
        let isGameActive = false;
        let isSpectator = false;
        
        let roomSize = 5;
        let playerOrder = [];
        let currentTurn = null;
        let playerNames = {};
        let currentMarkedNumbers = {};
        let currentMarkedCount = 0;
        let pendingProposal = null;
        let myCurrentBoardData = null;
        let specBoardDataStr = "";

        // Global Scores System
        let vicAlScores = { vic: 0, al: 0 };
        let isScoreListenerAttached = false;
        let scoreUpdatedForThisMatch = false;

        // --- AUTO CLEANUP SYSTEM ON LOAD ---
        function cleanupEmptyRooms() {
            get(ref(db, 'rooms')).then((snapshot) => {
                const rooms = snapshot.val();
                if (rooms) {
                    for (const rId in rooms) {
                        if (!rooms[rId].players || Object.keys(rooms[rId].players).length === 0) {
                            remove(ref(db, `rooms/${rId}`)); 
                        }
                    }
                }
            });
        }
        cleanupEmptyRooms();

        // --- BROWSER CLOSE CLEANUP ---
        window.addEventListener("beforeunload", () => {
            if (currentRoom && !isSpectator) {
                if (playerOrder.length <= 1) {
                    remove(ref(db, `rooms/${currentRoom}`));
                } else {
                    remove(ref(db, `rooms/${currentRoom}/players/${myId}`));
                }
            }
        });

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function generateWinningLines(size) {
            let lines = [];
            for(let r=0; r<size; r++) {
                let row = [];
                for(let c=0; c<size; c++) row.push(r*size + c);
                lines.push({indices: row, type: 'line-h'});
            }
            for(let c=0; c<size; c++) {
                let col = [];
                for(let r=0; r<size; r++) col.push(r*size + c);
                lines.push({indices: col, type: 'line-v'});
            }
            let d1 = [], d2 = [];
            for(let i=0; i<size; i++) {
                d1.push(i*size + i);
                d2.push(i*size + (size - 1 - i));
            }
            lines.push({indices: d1, type: 'line-d1'});
            lines.push({indices: d2, type: 'line-d2'});
            return lines;
        }

        function getPlayerName(id) {
            if (playerNames[id]) return playerNames[id];
            let index = playerOrder.indexOf(id);
            if (index === -1) index = Object.keys(playerNames).length;
            return `Player ${index + 1}`;
        }

        function isVicAlRoom() {
            if (playerOrder.length !== 2) return false;
            const name1 = getPlayerName(playerOrder[0]).trim().toLowerCase();
            const name2 = getPlayerName(playerOrder[1]).trim().toLowerCase();
            return (name1 === 'vic' && name2 === 'al') || (name1 === 'al' && name2 === 'vic');
        }

        function attachScoreListener() {
            if (isScoreListenerAttached) return;
            isScoreListenerAttached = true;
            onValue(ref(db, `globalScores/vic_al`), (snapshot) => {
                vicAlScores = snapshot.val() || { vic: 0, al: 0 };
                renderVicAlScore();
            });
        }

        function renderVicAlScore() {
            const scoreBoard = document.getElementById('vicAlScoreBoard');
            if (isVicAlRoom() && isGameActive) {
                scoreBoard.style.display = 'block';
                scoreBoard.innerText = `🏆 Vic: ${vicAlScores.vic || 0}   |   Al: ${vicAlScores.al || 0} 🏆`;
            } else {
                scoreBoard.style.display = 'none';
            }
        }

        function updateVicAlScore(winnerId) {
            if (!isVicAlRoom() || scoreUpdatedForThisMatch || isSpectator) return;
            scoreUpdatedForThisMatch = true;
            
            if (winnerId === myId) {
                const myName = getPlayerName(myId).trim().toLowerCase();
                if (myName === 'vic' || myName === 'al') {
                    const scoreRef = ref(db, `globalScores/vic_al/${myName}`);
                    get(scoreRef).then(snap => {
                        const currentScore = snap.val() || 0;
                        set(scoreRef, currentScore + 1);
                    });
                }
            }
        }

        window.createRoom = async function() {
            const id = document.getElementById('roomId').value;
            const max = parseInt(document.getElementById('maxPlayers').value) || 2;
            if (!id) return alert("Please enter a room name");
            currentRoom = id;
            
            document.getElementById('roomControls').style.pointerEvents = 'none';

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const snapshot = await get(roomRef);
            
            if (snapshot.exists() && snapshot.val().players && Object.keys(snapshot.val().players).length > 0) {
                document.getElementById('roomControls').style.pointerEvents = 'auto';
                return alert("Room already exists! Please click Join.");
            }

            isSpectator = false;
            await set(roomRef, {
                settings: { maxPlayers: max, status: 'waiting' },
                players: { [myId]: true },
                playerNames: { [myId]: "Player 1" }
            });

            onDisconnect(ref(db, `rooms/${currentRoom}/players/${myId}`)).remove();
            setupMainListener();
        };

        window.joinRoom = async function() {
            const id = document.getElementById('roomId').value;
            if (!id) return alert("Please enter a room name");
            currentRoom = id;
            
            document.getElementById('roomControls').style.pointerEvents = 'none';

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const snapshot = await get(roomRef);
            
            if (!snapshot.exists()) {
                document.getElementById('roomControls').style.pointerEvents = 'auto';
                return alert("Room does not exist! Please click Create.");
            }

            let roomData = snapshot.val();
            const pCount = Object.keys(roomData.players || {}).length;
            
            if (roomData.settings.status === 'playing') {
                isSpectator = true;
            } else if (pCount >= roomData.settings.maxPlayers) {
                if (confirm("Room is full. Do you want to join as a spectator?")) {
                    isSpectator = true;
                } else {
                    currentRoom = "";
                    document.getElementById('roomControls').style.pointerEvents = 'auto';
                    return;
                }
            } else {
                isSpectator = false;
                await update(ref(db, `rooms/${currentRoom}/players`), { [myId]: true });
                await update(ref(db, `rooms/${currentRoom}/playerNames`), { [myId]: `Player ${pCount + 1}` });
            }

            if (!isSpectator) {
                onDisconnect(ref(db, `rooms/${currentRoom}/players/${myId}`)).remove();
            }
            
            setupMainListener();
        };

        window.savePlayerName = function() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (name && currentRoom && !isSpectator) {
                update(ref(db, `rooms/${currentRoom}/playerNames`), { [myId]: name });
            }
        };

        function setupMainListener() {
            onValue(ref(db, `rooms/${currentRoom}`), (snapshot) => {
                const roomData = snapshot.val();
                
                if (!roomData) {
                    alert("Room was closed. Returning to lobby.");
                    location.reload();
                    return;
                }

                const settings = roomData.settings || {};
                const players = roomData.players || {};
                const markedNumbers = roomData.marked || {};
                const boards = roomData.boards || {};
                
                playerOrder = roomData.playerOrder || [];
                currentTurn = roomData.currentTurn || null;
                playerNames = roomData.playerNames || {};
                roomSize = settings.size || 5;
                
                currentMarkedNumbers = markedNumbers; // Lưu lại để dùng ở markNumber()
                currentMarkedCount = Object.keys(markedNumbers).length;
                const pCount = Object.keys(players).length;

                attachScoreListener();
                renderVicAlScore();

                // --- IMMEDIATE DELETE IF EMPTY ---
                if (pCount === 0) {
                    remove(ref(db, `rooms/${currentRoom}`));
                    if (isSpectator) {
                        alert("All players left. Room deleted.");
                        location.reload();
                    }
                    return;
                }

                // --- AUTO REVERT TO WAITING IF ALONE ---
                if (settings.status === 'playing' && pCount < 2) {
                    if (players[myId] && !isSpectator) {
                        alert("The other players have left. Returning to the waiting room.");
                        const updates = {
                            'settings/status': 'waiting',
                            marked: null,
                            winners: null,
                            boards: null,
                            proposal: null,
                            currentTurn: null,
                            lastMarked: null
                        };
                        update(ref(db, `rooms/${currentRoom}`), updates);
                        return; 
                    }
                }

                // --- WAITING MODE ---
                if (settings.status === 'waiting') {
                    isGameActive = false;
                    isGameOver = false;
                    scoreUpdatedForThisMatch = false;
                    myCurrentBoardData = null; 
                    specBoardDataStr = ""; 
                    
                    document.getElementById('roomControls').style.display = 'none';
                    document.getElementById('gameArea').style.display = 'none';
                    document.getElementById('waitingArea').style.display = 'flex';
                    document.getElementById('bingoBoard').innerHTML = '';
                    document.getElementById('spectatorArea').innerHTML = '';
                    
                    if (isSpectator) document.getElementById('playerNameInput').style.display = 'none';
                    
                    document.getElementById('waitingTitle').innerText = `Room: ${currentRoom}`;
                    document.getElementById('waitingStatus').innerText = `Waiting for players... (${pCount}/${settings.maxPlayers})`;
                    
                    if (!isSpectator && pCount >= 2) {
                        document.getElementById('startBtn').style.display = 'block';
                    } else {
                        document.getElementById('startBtn').style.display = 'none';
                    }
                } 
                // --- PLAYING MODE ---
                else if (settings.status === 'playing') {
                    isGameActive = true;
                    document.getElementById('roomControls').style.display = 'none';
                    document.getElementById('waitingArea').style.display = 'none';
                    document.getElementById('gameArea').style.display = 'flex';

                    // 1. Setup Boards
                    if (isSpectator) {
                        document.getElementById('bingoBoard').style.display = 'none';
                        document.getElementById('spectatorArea').style.display = 'flex';
                        renderSpectatorBoards(boards);
                    } else {
                        document.getElementById('bingoBoard').style.display = 'grid';
                        document.getElementById('spectatorArea').style.display = 'none';
                        if (!boards[myId]) {
                            generateAndUploadBoard(roomSize);
                            return;
                        }
                        if (JSON.stringify(myCurrentBoardData) !== JSON.stringify(boards[myId])) {
                            myCurrentBoardData = boards[myId];
                            renderPlayerBoard(boards[myId]);
                        }
                    }

                    // 2. Apply Marks & Colors
                    if (currentMarkedCount === 0) {
                        isGameOver = false;
                        scoreUpdatedForThisMatch = false;
                    }
                    
                    document.querySelectorAll('.cell').forEach(el => {
                        const num = el.getAttribute('data-num');
                        for(let i=0; i<6; i++) el.classList.remove(`color-${i}`);
                        el.classList.remove('last-marked');

                        if (markedNumbers[num]) {
                            const markerId = markedNumbers[num];
                            const colorIndex = playerOrder.indexOf(markerId);
                            if (colorIndex !== -1) el.classList.add(`color-${colorIndex}`);
                        }
                        
                        if (roomData.lastMarked == num) {
                            el.classList.add('last-marked');
                        }
                    });

                    // 3. Logic & UI Updates
                    checkAndProcessBingo(markedNumbers, roomData.winners, roomData);
                    updateControlsUI();
                }
            });

            // Listen to proposals
            onValue(ref(db, `rooms/${currentRoom}/proposal`), (snapshot) => {
                if (isSpectator) return;
                pendingProposal = snapshot.val();
                const modal = document.getElementById('proposalModal');
                
                if (pendingProposal && pendingProposal.from !== myId) {
                    document.getElementById('proposalMsg').innerText = "Opponent wants to go first. Do you agree?";
                    modal.style.display = 'flex';
                } else {
                    modal.style.display = 'none';
                }
            });
        }

        window.startGame = async function() {
            const snap = await get(ref(db, `rooms/${currentRoom}/players`));
            const pIds = Object.keys(snap.val() || {});
            if (pIds.length < 2) return alert("Need at least 2 players!");
            
            const size = pIds.length + 3; 
            
            const updates = {};
            updates['settings/status'] = 'playing';
            updates['settings/size'] = size;
            updates['playerOrder'] = pIds;
            
            if (pIds.length === 2) {
                updates['currentTurn'] = null;
            } else {
                updates['currentTurn'] = pIds[Math.floor(Math.random() * pIds.length)]; 
            }
            
            await update(ref(db, `rooms/${currentRoom}`), updates);
        };

        window.shuffleMyBoard = function() {
            if (currentMarkedCount > 0) return;
            generateAndUploadBoard(roomSize);
        };

        function generateAndUploadBoard(size) {
            const numbers = Array.from({length: size * size}, (_, i) => i + 1);
            const shuffled = shuffle(numbers);
            update(ref(db, `rooms/${currentRoom}/boards`), { [myId]: shuffled });
        }

        function renderPlayerBoard(numbers) {
            const board = document.getElementById('bingoBoard');
            board.style.gridTemplateColumns = `repeat(${roomSize}, 60px)`;
            board.innerHTML = '';
            
            numbers.forEach((num) => {
                let div = document.createElement('div');
                div.className = 'cell';
                div.innerText = num;
                div.setAttribute('data-num', num);
                div.onclick = () => markNumber(num);
                board.appendChild(div);
            });
        }

        function renderSpectatorBoards(boards) {
            const currentStr = JSON.stringify(boards);
            if (specBoardDataStr === currentStr) return; 
            specBoardDataStr = currentStr;

            const specArea = document.getElementById('spectatorArea');
            specArea.innerHTML = '';
            
            playerOrder.forEach((pId, index) => {
                if (!boards[pId]) return;
                
                let wrapper = document.createElement('div');
                wrapper.className = 'board-wrapper';
                
                let title = document.createElement('div');
                title.className = 'board-title';
                title.innerText = getPlayerName(pId);
                title.style.color = getPlayerColorHex(index);
                
                let boardDiv = document.createElement('div');
                boardDiv.id = `board-${pId}`;
                boardDiv.className = 'grid';
                boardDiv.style.gridTemplateColumns = `repeat(${roomSize}, 60px)`;
                
                boards[pId].forEach(num => {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = num;
                    cell.setAttribute('data-num', num);
                    boardDiv.appendChild(cell);
                });

                wrapper.appendChild(title);
                wrapper.appendChild(boardDiv);
                specArea.appendChild(wrapper);
            });
        }

        function getPlayerColorHex(index) {
            const colors = ['#28a745', '#007bff', '#dc3545', '#ffc107', '#6c757d', '#17a2b8'];
            return colors[index % colors.length];
        }

        window.proposeFirst = function(type) {
            if (isSpectator) return;
            if (type === 'me') {
                set(ref(db, `rooms/${currentRoom}/proposal`), { from: myId });
            } else if (type === 'opp') {
                const oppId = playerOrder.find(id => id !== myId);
                set(ref(db, `rooms/${currentRoom}/currentTurn`), oppId);
            }
        };

        window.respondProposal = function(agree) {
            if (agree && pendingProposal) {
                set(ref(db, `rooms/${currentRoom}/currentTurn`), pendingProposal.from);
            }
            remove(ref(db, `rooms/${currentRoom}/proposal`));
        };

        window.markNumber = function(num) {
            if (isSpectator || !currentRoom || isGameOver || !isGameActive) return;
            
            // NGĂN CHẶN BẤM VÀO Ô ĐÃ ĐƯỢC CHỌN (Sửa lỗi mất lượt)
            if (currentMarkedNumbers[num]) return; 

            if (!currentTurn) return alert("Please agree on who goes first!");
            if (currentTurn !== myId) return alert("Not your turn!");

            const currentIndex = playerOrder.indexOf(myId);
            const nextIndex = (currentIndex + 1) % playerOrder.length;
            const nextTurn = playerOrder[nextIndex];

            const updates = {};
            updates[`marked/${num}`] = myId;
            updates[`currentTurn`] = nextTurn;
            updates[`lastMarked`] = num;
            update(ref(db, `rooms/${currentRoom}`), updates);
        };

        function updateControlsUI() {
            const firstMoveControls = document.getElementById('firstMoveControls');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const proposeMeBtn = document.getElementById('proposeMeBtn');
            const proposeOppBtn = document.getElementById('proposeOppBtn');
            const turnDiv = document.getElementById('turnIndicator');

            if (isSpectator || isGameOver) {
                firstMoveControls.style.display = 'none';
                if(isSpectator && !isGameOver) turnDiv.style.display = 'none';
                return;
            }

            firstMoveControls.style.display = 'flex';
            
            shuffleBtn.style.display = (currentMarkedCount === 0) ? 'inline-block' : 'none';

            if (playerOrder.length === 2 && !currentTurn) {
                proposeMeBtn.style.display = 'inline-block';
                proposeOppBtn.style.display = 'inline-block';
                turnDiv.style.display = 'none';
                document.getElementById('status').innerText = "Choose who goes first!";
            } else {
                proposeMeBtn.style.display = 'none';
                proposeOppBtn.style.display = 'none';
                turnDiv.style.display = 'block';
                
                if (currentTurn === myId) {
                    turnDiv.innerText = "Your turn!";
                    turnDiv.style.color = "#28a745";
                } else {
                    turnDiv.innerText = `${getPlayerName(currentTurn)}'s turn...`;
                    turnDiv.style.color = "#dc3545";
                }

                if (playerOrder.length > 2 && currentMarkedCount === 0) {
                    document.getElementById('status').innerText = "Game started! You can shuffle before the first move.";
                }
            }

            if (shuffleBtn.style.display === 'none' && proposeMeBtn.style.display === 'none') {
                firstMoveControls.style.display = 'none';
            }
        }

        function checkAndProcessBingo(markedNumbers, existingWinners, roomData) {
            const winningLinesData = generateWinningLines(roomSize);
            const linesToWin = roomSize; 
            
            const allBoards = isSpectator ? document.querySelectorAll('#spectatorArea .grid') : [document.getElementById('bingoBoard')];
            
            allBoards.forEach(board => {
                const cells = board.querySelectorAll('.cell');
                if (cells.length === 0) return;
                
                cells.forEach(c => c.classList.remove('winning-cell', 'line-h', 'line-v', 'line-d1', 'line-d2'));
                
                winningLinesData.forEach(line => {
                    let isComplete = line.indices.every(idx => !!markedNumbers[cells[idx].getAttribute('data-num')]);
                    if (isComplete) {
                        line.indices.forEach(idx => cells[idx].classList.add('winning-cell', line.type));
                    }
                });
            });

            if (!isSpectator) {
                const cells = document.querySelectorAll('#bingoBoard .cell');
                if (cells.length > 0) {
                    let linesCompleted = 0;
                    winningLinesData.forEach(line => {
                        if (line.indices.every(idx => !!markedNumbers[cells[idx].getAttribute('data-num')])) {
                            linesCompleted++;
                        }
                    });

                    if (!isGameOver && currentTurn) {
                        document.getElementById('status').innerText = `In Match | Lines: ${linesCompleted} / ${linesToWin}`;
                    }

                    if (linesCompleted >= linesToWin && !existingWinners?.[myId]) {
                        update(ref(db, `rooms/${currentRoom}/winners`), { [myId]: true });
                    }
                }
            } else if (!isGameOver) {
                document.getElementById('status').innerText = `Spectating | Match in progress...`;
            }

            if (existingWinners) {
                isGameOver = true;
                setTimeout(async () => {
                    const snap = await get(ref(db, `rooms/${currentRoom}/winners`));
                    const latestWinners = snap.val() || {};
                    const winIds = Object.keys(latestWinners);
                    
                    document.getElementById('afterGameActions').style.display = 'flex';
                    document.getElementById('turnIndicator').style.display = 'none';
                    document.getElementById('firstMoveControls').style.display = 'none';
                    
                    document.getElementById('winMsg').style.display = 'none';
                    document.getElementById('loseMsg').style.display = 'none';
                    
                    // --- LOẠI BỎ DRAW ---
                    // Phân định thắng thua thực sự bằng cách xem ai là người đánh ô số cuối cùng (tạo ra Bingo)
                    let actualWinnerId = winIds[0];
                    if (winIds.length >= 2) {
                        const lastMarkedNum = roomData.lastMarked;
                        actualWinnerId = roomData.marked[lastMarkedNum] || winIds[0];
                    }

                    if (actualWinnerId === myId) {
                        document.getElementById('winMsg').style.display = 'block';
                        document.getElementById('status').innerText = "You Won!";
                    } else if (!isSpectator) {
                        document.getElementById('loseMsg').style.display = 'block';
                        document.getElementById('status').innerText = "You Lost!";
                    } else {
                        document.getElementById('status').innerText = `${getPlayerName(actualWinnerId)} Wins!`;
                    }

                    // Cập nhật điểm cho Vic và Al
                    updateVicAlScore(actualWinnerId);

                }, 500);
            } else {
                document.getElementById('winMsg').style.display = 'none';
                document.getElementById('loseMsg').style.display = 'none';
                document.getElementById('afterGameActions').style.display = 'none';
            }
        }

        window.newGame = function() {
            if (isSpectator) return;
            scoreUpdatedForThisMatch = false;
            
            const updates = { 
                marked: null, 
                winners: null, 
                lastMarked: null, 
                boards: null,
                proposal: null
            };
            
            if (playerOrder.length === 2) {
                updates.currentTurn = null;
            } else {
                updates.currentTurn = playerOrder[Math.floor(Math.random() * playerOrder.length)];
            }

            myCurrentBoardData = null;
            specBoardDataStr = "";
            document.getElementById('bingoBoard').innerHTML = '';
            document.getElementById('spectatorArea').innerHTML = '';
            
            update(ref(db, `rooms/${currentRoom}`), updates);
        };

        window.leaveRoom = async function() {
            if (currentRoom) {
                if (!isSpectator) {
                    const snap = await get(ref(db, `rooms/${currentRoom}/players`));
                    const players = snap.val() || {};
                    const pIds = Object.keys(players);
                    
                    if (pIds.length <= 1 && pIds.includes(myId)) {
                        await remove(ref(db, `rooms/${currentRoom}`)); 
                    } else {
                        await remove(ref(db, `rooms/${currentRoom}/players/${myId}`)); 
                    }
                }
                location.reload();
            }
        };
    </script>
</body>
