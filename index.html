<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bingo Realtime</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; margin-top: 20px; }
        .cell { width: 60px; height: 60px; border: 2px solid #333; display: flex; align-items: center; 
                justify-content: center; cursor: pointer; font-weight: bold; border-radius: 12px; }
        .marked { background-color: #ffcc00; border-color: #e6b800; }
        .controls { display: flex; gap: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="roomId" placeholder="Enter Room Name">
        <button onclick="joinRoom()">Join / Create Room</button>
    </div>
    <div id="status"></div>
    <div id="bingoBoard" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfpiAPFdf-TGrzZksRDXecy7szOoU_5ts",
            authDomain: "bingo-964ba.firebaseapp.com",
            databaseURL: "https://bingo-964ba-default-rtdb.firebaseio.com",
            projectId: "bingo-964ba",
            storageBucket: "bingo-964ba.firebasestorage.app",
            messagingSenderId: "870098576889",
            appId: "1:870098576889:web:7d1e32ca3d091a2aa44928"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRoom = "";

        // 1. Shuffle numbers for a random board
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById('bingoBoard');
            board.innerHTML = '';
            const numbers = Array.from({length: 25}, (_, i) => i + 1);
            const shuffled = shuffle(numbers);

            shuffled.forEach(num => {
                let div = document.createElement('div');
                div.className = 'cell';
                div.innerText = num;
                div.id = `cell-${num}`;
                div.onclick = () => markNumber(num);
                board.appendChild(div);
            });
        }

        // 2. Join/Create logic
        window.joinRoom = function() {
            const id = document.getElementById('roomId').value;
            if (!id) return alert("Enter a Room Name!");
            currentRoom = id;
            
            document.getElementById('status').innerText = "Connected to Room: " + id;
            createBoard();

            // Sync: Listen for marked numbers
            onValue(ref(db, 'rooms/' + currentRoom + '/marked'), (snapshot) => {
                const data = snapshot.val() || {};
                Object.keys(data).forEach(num => {
                    const el = document.getElementById(`cell-${num}`);
                    if (el) el.classList.add('marked');
                });
            });
        };

        // 3. Mark number for both players
        function markNumber(num) {
            if (!currentRoom) return alert("Join a room first!");
            const updates = {};
            updates[`/rooms/${currentRoom}/marked/${num}`] = true;
            update(ref(db), updates);
        }
    </script>
</body>
</html>
