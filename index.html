<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Bingo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; margin-top: 20px; }
        .cell { width: 60px; height: 60px; border: 2px solid #333; display: flex; align-items: center; 
                justify-content: center; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .cell:hover { background-color: #f0f0f0; }
        .marked { background-color: #ffcc00; border-color: #e6b800; transform: scale(0.95); }
        .controls { margin-bottom: 20px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="roomId" placeholder="Enter Room ID...">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div id="bingoBoard" class="grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDfpiAPFdf-TGrzZksRDXecy7szOoU_5ts",
            authDomain: "bingo-964ba.firebaseapp.com",
            databaseURL: "https://bingo-964ba-default-rtdb.firebaseio.com",
            projectId: "bingo-964ba",
            storageBucket: "bingo-964ba.firebasestorage.app",
            messagingSenderId: "870098576889",
            appId: "1:870098576889:web:7d1e32ca3d091a2aa44928",
            measurementId: "G-M5YF87ZDMW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRoom = "";

        // 1. Create the Bingo board (Static 1-25 for testing)
        function createBoard() {
            const board = document.getElementById('bingoBoard');
            board.innerHTML = '';
            for (let i = 1; i <= 25; i++) {
                let div = document.createElement('div');
                div.className = 'cell';
                div.innerText = i;
                div.id = `num-${i}`;
                div.onclick = () => markNumber(i);
                board.appendChild(div);
            }
        }

        // 2. Join a Room function
        window.joinRoom = function() {
            const id = document.getElementById('roomId').value;
            if (!id) return alert("Please enter a Room ID!");
            currentRoom = id;

            // Clear old UI markers
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('marked'));

            // Listen for changes in the specific room
            const roomRef = ref(db, 'rooms/' + currentRoom + '/markedNumbers');
            onValue(roomRef, (snapshot) => {
                const markedData = snapshot.val() || {};
                
                // Update board based on Firebase data
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('marked'));
                Object.keys(markedData).forEach(num => {
                    const el = document.getElementById(`num-${num}`);
                    if (el) el.classList.add('marked');
                });
            });

            alert("Joined room: " + currentRoom);
        };

        // 3. Mark number function
        function markNumber(num) {
            if (!currentRoom) return alert("Please join a room first!");
            
            // Sync marked number to Firebase
            const updates = {};
            updates[`/rooms/${currentRoom}/markedNumbers/${num}`] = true;
            update(ref(db), updates);
        }

        createBoard();
    </script>
</body>
</html>
